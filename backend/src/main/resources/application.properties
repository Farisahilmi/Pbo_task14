# Quarkus Application Properties - MovieTickets Platform

# HTTP Port & CORS
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept

# Database Configuration (H2 File Database fallback)
# quarkus.datasource.db-kind=h2
# quarkus.datasource.jdbc.url=jdbc:h2:file:./data/movieticketsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
# quarkus.datasource.username=sa
# quarkus.datasource.password=sa

# PostgreSQL Configuration (Active)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/movietickets
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

# Hibernate ORM & Panache
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://db:5432/movietickets
%prod.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.google.oauth.redirect-uri=http://localhost:8080/api/v1/auth/google/callback
%prod.google.oauth.frontend-redirect=http://localhost:5173/auth/google/success

# JWT Security Configuration
smallrye.jwt.sign.key.location=secret.jwk
smallrye.jwt.verify.key.location=secret.jwk
smallrye.jwt.sign.algorithm=HS256
smallrye.jwt.verify.algorithm=HS256
smallrye.jwt.new-token.issuer=https://movietickets.id/issuer
smallrye.jwt.new-token.lifespan=86400

# OpenAPI & Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.info-title=MovieTickets Online Booking API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API endpoints untuk pemesanan tiket bioskop online, manajemen jadwal, seat locking, e-ticket QR, dan Admin CMS.

# TMDB API Configuration (The Movie Database)
quarkus.rest-client.tmdb-api.url=https://api.themoviedb.org/3
tmdb.api.key=${TMDB_API_KEY}

# Google OAuth 2.0 / OpenID Connect Configuration
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=http://localhost:8080/api/v1/auth/google/callback
google.oauth.frontend-redirect=http://localhost:5173/auth/google/success

# Midtrans Payment Gateway Configuration
# Default (Global) or Prod Profile config is required by Quarkus
midtrans.server-key=${MIDTRANS_PROD_SERVER_KEY:SB-Mid-server-DemoSandboxKey123}
midtrans.client-key=${MIDTRANS_PROD_CLIENT_KEY:SB-Mid-client-DemoSandboxKey123}
midtrans.base-url=https://app.sandbox.midtrans.com

%dev.midtrans.server-key=${MIDTRANS_SANDBOX_SERVER_KEY:SB-Mid-server-DemoSandboxKey123}
%dev.midtrans.client-key=${MIDTRANS_SANDBOX_CLIENT_KEY:SB-Mid-client-DemoSandboxKey123}
%dev.midtrans.base-url=https://app.sandbox.midtrans.com
%dev.midtrans.api-base-url=https://api.sandbox.midtrans.com

%prod.midtrans.server-key=${MIDTRANS_PROD_SERVER_KEY:SB-Mid-server-DemoSandboxKey123}
%prod.midtrans.client-key=${MIDTRANS_PROD_CLIENT_KEY:SB-Mid-client-DemoSandboxKey123}
%prod.midtrans.base-url=https://app.sandbox.midtrans.com
%prod.midtrans.api-base-url=https://api.sandbox.midtrans.com

# Default fallback for test profile
midtrans.server-key=${MIDTRANS_SANDBOX_SERVER_KEY:SB-Mid-server-DemoSandboxKey123}
midtrans.client-key=${MIDTRANS_SANDBOX_CLIENT_KEY:SB-Mid-client-DemoSandboxKey123}
midtrans.base-url=https://app.sandbox.midtrans.com
midtrans.api-base-url=https://api.sandbox.midtrans.com

# Quarkus REST Client for Midtrans SNAP API & Core API
quarkus.rest-client."midtrans-snap-api".url=${midtrans.base-url}
quarkus.rest-client."midtrans-core-api".url=${midtrans.api-base-url}

