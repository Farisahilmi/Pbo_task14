
services:
  db:
    image: postgres:16-alpine
    container_name: movietickets-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: movietickets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - movietickets-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movietickets-backend
    environment:
      - QUARKUS_PROFILE=prod
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/movietickets
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - movietickets-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movietickets-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - movietickets-net

volumes:
  pgdata:

networks:
  movietickets-net:
    driver: bridge
