<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieTickets - Luxury Online Cinema Booking</title>
    <meta name="description" content="Platform pemesanan tiket bioskop online terbaik dengan pemilihan kursi interaktif, e-ticket QR instant, dan berbagai pilihan bioskop di Indonesia." />
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google Identity Services (OAuth 2.0 / OpenID Connect Official Library) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Anti-FOUC script to set initial data-theme before rendering -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('mtx_theme') || 'system';
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
